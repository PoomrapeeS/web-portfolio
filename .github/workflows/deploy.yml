name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Lowercased automatically by the step below; declared here for clarity
  IMAGE_NAME: poomrapees/web-portfolio

jobs:
  # ──────────────────────────────────────────────
  # 1. Build Docker image and push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 2. SSH into Droplet and redeploy
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          # Pass credentials as env vars so they are NOT expanded inline
          # in the script text (avoids accidental secret leakage in logs)
          envs: GHCR_PAT,GHCR_USER,IMAGE_REF
          script: |
            set -euo pipefail

            # Authenticate with GHCR
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull latest image
            docker pull "$IMAGE_REF"

            # Graceful replacement of the running container
            docker stop portfolio 2>/dev/null || true
            docker rm   portfolio 2>/dev/null || true

            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 80:80 \
              "$IMAGE_REF"

            # Remove dangling images to save disk space
            docker image prune -f

            echo "Deployment complete — $(date -u)"
        env:
          GHCR_PAT:  ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_REF: ghcr.io/${{ env.IMAGE_NAME }}:latest
