worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;
  server_tokens   off;

  # Gzip compression
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   5;
  gzip_min_length   256;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    image/svg+xml
    font/woff2;

  # ── HTTP: redirect all traffic to HTTPS ──
  server {
    listen 80;
    server_name poomdev.me www.poomdev.me;

    # Allow Certbot renewal challenges through
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS: main site ──
  server {
    listen 443 ssl;
    http2 on;
    server_name poomdev.me www.poomdev.me;

    root  /usr/share/nginx/html;
    index index.html;

    # SSL certificates (mounted from host via Docker volume)
    ssl_certificate     /etc/letsencrypt/live/poomdev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poomdev.me/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"   always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
      always;

    # Long-lived cache for versioned static assets
    location ~* \.(css|js|ico|svg|woff2?|ttf|eot|png|jpg|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # Main route — serve index.html for all paths (SPA-friendly)
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Block access to dot-files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Health check endpoint
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }
  }
}
